<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plagiarism Checker</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Custom CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

</head>

<body style="background:#f5f7f6;">


<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">

<div class="container">

<a class="navbar-brand fw-bold text-success">
Plagiarism Checker
</a>

<button class="btn btn-success">
Premium
</button>

</div>

</nav>


<!-- TITLE -->

<div class="container text-center mt-5">

<h1 class="fw-bold">
AI Plagiarism Checker
</h1>

<p class="text-muted">
Check plagiarism using Sentence-BERT AI model
</p>

</div>


<!-- MAIN CARD -->

<div class="container mt-5">

<div class="card shadow-lg">

<div class="card-body">

<div class="row">


<!-- LEFT SIDE -->

<div class="col-md-6 border-end">

<form method="POST">

<label class="form-label">Text 1</label>

<textarea class="form-control mb-3" name="text1" rows="6"></textarea>

<label class="form-label">Text 2</label>

<textarea class="form-control mb-3" name="text2" rows="6"></textarea>

<button class="btn btn-success">
Scan for plagiarism
</button>

</form>

</div>


<!-- RIGHT SIDE -->

<div class="col-md-6">

<h4>Results</h4>

<h2 class="text-success">

{% if result %}
{{result}} %
{% else %}
0 %
{% endif %}

</h2>

<table class="table mt-4">

<tr>
<td>Grammar</td>
<td>-</td>
</tr>

<tr>
<td>Spelling</td>
<td>-</td>
</tr>

<tr>
<td>Readability</td>
<td>-</td>
</tr>

</table>

</div>


</div>

</div>

</div>

</div>


</body>
</html>
